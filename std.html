<!DOCTYPE html>
<html>
<head>
<title>Student Grade Calculator</title>

<style>
body{
font-family: Arial;
text-align:center;
background-color:#f2f2f2;
}

.container{
background:white;
padding:20px;
width:300px;
margin:auto;
margin-top:100px;
border-radius:10px;
box-shadow:0 0 10px gray;
}

input{
margin:5px;
padding:8px;
width:80%;
}

button{
padding:10px;
background-color:blue;
color:white;
border:none;
cursor:pointer;
}

#result{
margin-top:15px;
font-weight:bold;
}
</style>

</head>

<body>

<div class="container">

<h2>Student Grade Calculator</h2>

<input type="number" id="m1" placeholder="Subject 1 Marks"><br>
<input type="number" id="m2" placeholder="Subject 2 Marks"><br>
<input type="number" id="m3" placeholder="Subject 3 Marks"><br>

<button onclick="calculate()">Calculate</button>

<div id="result"></div>

</div>

<script>

function calculate(){

let m1 = Number(document.getElementById("m1").value);
let m2 = Number(document.getElementById("m2").value);
let m3 = Number(document.getElementById("m3").value);

let total = m1 + m2 + m3;
let avg = total / 3;

let grade;

if(avg >= 90){
grade = "A";
}
else if(avg >= 75){
grade = "B";
}
else if(avg >= 60){
grade = "C";
}
else if(avg >= 50){
grade = "D";
}
else{
grade = "F";
}

document.getElementById("result").innerHTML =
"Total: " + total +
"<br>Average: " + avg +
"<br>Grade: " + grade;

}

</script>

</body>
</html>
