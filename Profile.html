<!DOCTYPE html>
<html>
<head>
<title>Advanced Profile Card</title>

<style>

body{
font-family: Arial, sans-serif;
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#6a11cb,#2575fc);
}

/* Flip Card */

.container{
perspective:1000px;
}

.card{
width:350px;
height:480px;
position:relative;
transform-style:preserve-3d;
transition:0.8s;
}

.container:hover .card{
transform:rotateY(180deg);
}

.front, .back{
position:absolute;
width:100%;
height:100%;
backface-visibility:hidden;
border-radius:20px;
padding:25px;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
background:rgba(255,255,255,0.9);
backdrop-filter:blur(10px);
text-align:center;
}

/* Back Side */

.back{
transform:rotateY(180deg);
}

/* Profile Image */

.profile-img{
width:120px;
height:120px;
border-radius:50%;
border:4px solid #2575fc;
}

/* Name */

h2{
margin:10px 0;
}

/* Typing Role */

.role{
color:#555;
font-weight:bold;
height:20px;
}

/* Stats */

.stats{
display:flex;
justify-content:space-around;
margin:15px 0;
}

.stats div{
text-align:center;
}

/* Skills */

.skill{
text-align:left;
margin:8px 0;
}

.bar{
background:#ddd;
border-radius:20px;
overflow:hidden;
}

.progress{
height:8px;
background:#2575fc;
}

/* Buttons */

button{
border:none;
padding:10px 18px;
margin:5px;
border-radius:20px;
cursor:pointer;
font-weight:bold;
}

.follow{
background:#2575fc;
color:white;
}

.contact{
background:#ff9800;
color:white;
}

/* Social */

.social{
margin-top:15px;
}

.social a{
text-decoration:none;
font-size:20px;
margin:8px;
}

/* Glow Border */

.front{
border:2px solid transparent;
background-clip:padding-box;
position:relative;
}

.front:before{
content:"";
position:absolute;
top:-2px;
left:-2px;
right:-2px;
bottom:-2px;
background:linear-gradient(45deg,#ff00cc,#3333ff);
border-radius:20px;
z-index:-1;
filter:blur(6px);
}

/* Responsive */

@media(max-width:400px){
.card{
width:90%;
}
}

</style>
</head>

<body>

<div class="container">

<div class="card">

<!-- FRONT -->

<div class="front">

<img src="c:\Users\rashe\CrossDevice\iQOO Z9x 5G\Sarthak.jpeg" class="profile-img">

<div class="stats">

<script>

</body>
</html>
